<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel — lackofabetter.work</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            background: #07070f;
            font-family: 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            color: white;
        }

        #map-svg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
        }

        /* ── Country paths ── */
        .country {
            fill: #0f0f1c;
            stroke: #181830;
            stroke-width: 0.4;
        }

        .country.visited {
            cursor: pointer;
            transition: fill-opacity 0.4s ease;
        }

        /* ── Arc ── */
        .flight-arc {
            fill: none;
            stroke: rgba(255, 255, 255, 0.45);
            stroke-width: 1;
            stroke-linecap: round;
        }

        /* ── UI Chrome ── */
        #site-title {
            position: fixed;
            top: 36px;
            left: 44px;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        #counter {
            position: fixed;
            top: 36px;
            right: 44px;
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.15);
            z-index: 10;
        }

        /* ── Hover info ── */
        #hover-info {
            position: fixed;
            bottom: 40px;
            left: 44px;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        #hover-info.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #info-native {
            font-size: 10px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 6px;
        }

        #info-name {
            font-size: 36px;
            font-weight: 200;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1;
        }

        #info-hint {
            margin-top: 10px;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.2);
        }

        /* ── Home label ── */
        .home-label {
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            fill: rgba(255, 255, 255, 0.25);
        }

        /* ── Ripple animation ── */
        @keyframes ripple {
            0%   { r: 4px;  opacity: 0.7; }
            100% { r: 22px; opacity: 0;   }
        }

        /* ── Graticule lines ── */
        .graticule {
            fill: none;
            stroke: rgba(255, 255, 255, 0.025);
            stroke-width: 0.4;
        }

        /* ── Sphere (ocean) ── */
        .sphere {
            fill: #060610;
        }
    </style>
</head>
<body>

<div id="site-title">lackofabetter.work</div>
<div id="counter"></div>

<div id="hover-info">
    <div id="info-native"></div>
    <div id="info-name"></div>
    <div id="info-hint">click to explore →</div>
</div>

<svg id="map-svg"></svg>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Change to your home city [longitude, latitude]
const HOME = {
    coordinates: [-0.1276, 51.5074],
    label: 'Home'
};

// ── DIMENSIONS ────────────────────────────────────────────────────────────────
const W = window.innerWidth;
const H = window.innerHeight;

// ── SVG SETUP ─────────────────────────────────────────────────────────────────
const svg = d3.select('#map-svg')
    .attr('width', W)
    .attr('height', H);

const projection = d3.geoNaturalEarth1()
    .scale(W / 6.0)
    .translate([W / 2, H / 2]);

const geoPath = d3.geoPath().projection(projection);

// ── DEFS (filters) ────────────────────────────────────────────────────────────
const defs = svg.append('defs');

function makeGlowFilter(id, stdDeviation) {
    const filter = defs.append('filter')
        .attr('id', id)
        .attr('x', '-80%').attr('y', '-80%')
        .attr('width', '260%').attr('height', '260%');
    filter.append('feGaussianBlur')
        .attr('in', 'SourceGraphic')
        .attr('stdDeviation', stdDeviation)
        .attr('result', 'blur');
    const merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'blur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');
}

makeGlowFilter('glow-soft', 5);
makeGlowFilter('glow-strong', 10);
makeGlowFilter('glow-arc', 3);

// ── LAYER GROUPS ─────────────────────────────────────────────────────────────
const gSphere     = svg.append('g');
const gGraticule  = svg.append('g');
const gCountries  = svg.append('g');
const gBorders    = svg.append('g');
const gArcs       = svg.append('g');
const gMarkers    = svg.append('g');

// ── SPHERE & GRATICULE ────────────────────────────────────────────────────────
gSphere.append('path')
    .datum({ type: 'Sphere' })
    .attr('class', 'sphere')
    .attr('d', geoPath);

gGraticule.append('path')
    .datum(d3.geoGraticule()())
    .attr('class', 'graticule')
    .attr('d', geoPath);

// ── MAIN INIT ─────────────────────────────────────────────────────────────────
async function init() {
    const [world, manifest] = await Promise.all([
        d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
        d3.json('countries/manifest.json')
    ]);

    const visitedList = await Promise.all(
        manifest.countries.map(id =>
            d3.json(`countries/${id}/data.json`).then(data => ({ id, ...data }))
        )
    );

    const visitedByIso = new Map(visitedList.map(c => [String(c.iso_numeric), c]));

    document.getElementById('counter').textContent =
        `${visitedList.length} ${visitedList.length === 1 ? 'country' : 'countries'} explored`;

    const features = topojson.feature(world, world.objects.countries).features;
    const borders  = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

    // ── Draw countries ────────────────────────────────────────────────────────
    gCountries.selectAll('path')
        .data(features)
        .join('path')
        .attr('d', geoPath)
        .attr('class', d => visitedByIso.has(String(d.id)) ? 'country visited' : 'country')
        .each(function(d) {
            const country = visitedByIso.get(String(d.id));
            if (!country) return;

            const color = country.flag_colors?.[1] ?? '#ffffff';
            d3.select(this)
                .attr('fill', color)
                .attr('fill-opacity', 0.45)
                .attr('filter', 'url(#glow-soft)');

            // Idle pulse via D3 transitions
            pulsePath(d3.select(this), 0.45, 0.7, 2800 + Math.random() * 800);
        })
        .on('mouseenter', function(event, d) {
            const country = visitedByIso.get(String(d.id));
            if (!country) return;

            d3.select(this)
                .interrupt()
                .attr('fill-opacity', 0.85)
                .attr('filter', 'url(#glow-strong)');

            document.getElementById('info-native').textContent = country.name_in_language ?? '';
            document.getElementById('info-name').textContent   = country.name;
            document.getElementById('hover-info').classList.add('visible');

            drawArc(country);
        })
        .on('mouseleave', function(event, d) {
            const country = visitedByIso.get(String(d.id));
            if (!country) return;

            const color = country.flag_colors?.[1] ?? '#ffffff';
            d3.select(this)
                .interrupt()
                .attr('fill', color)
                .attr('filter', 'url(#glow-soft)');

            pulsePath(d3.select(this), 0.45, 0.7, 2800 + Math.random() * 800);

            document.getElementById('hover-info').classList.remove('visible');
            clearArcs();
        })
        .on('click', function(event, d) {
            const country = visitedByIso.get(String(d.id));
            if (country) window.location.href = `countries/${country.id}/index.html`;
        });

    // ── Borders ───────────────────────────────────────────────────────────────
    gBorders.append('path')
        .datum(borders)
        .attr('d', geoPath)
        .attr('fill', 'none')
        .attr('stroke', '#1a1a2e')
        .attr('stroke-width', 0.35);

    // ── Home marker ───────────────────────────────────────────────────────────
    const homeXY = projection(HOME.coordinates);
    if (homeXY) {
        const g = gMarkers.append('g').attr('transform', `translate(${homeXY})`);

        g.append('circle').attr('r', 12)
            .attr('fill', 'none')
            .attr('stroke', 'rgba(255,255,255,0.08)')
            .attr('stroke-width', 1);

        g.append('circle').attr('r', 3)
            .attr('fill', 'rgba(255,255,255,0.4)')
            .attr('filter', 'url(#glow-soft)');

        g.append('text')
            .attr('class', 'home-label')
            .attr('x', 8).attr('y', -8)
            .text(HOME.label);
    }

    // ── Visited country dots ───────────────────────────────────────────────────
    visitedList.forEach(country => {
        if (!country.coordinates) return;
        const xy = projection(country.coordinates);
        if (!xy) return;

        const color = country.flag_colors?.[1] ?? '#ffffff';
        const g = gMarkers.append('g').attr('transform', `translate(${xy})`);

        // Ripple ring — re-triggered on animationiteration
        const ring = g.append('circle')
            .attr('r', 4)
            .attr('fill', 'none')
            .attr('stroke', color)
            .attr('stroke-width', 1.2)
            .attr('opacity', 0.7);

        animateRipple(ring);

        // Center dot
        g.append('circle')
            .attr('r', 2.5)
            .attr('fill', color)
            .attr('filter', 'url(#glow-soft)');
    });
}

// ── IDLE PULSE (D3 recursive transition) ──────────────────────────────────────
function pulsePath(sel, lo, hi, dur) {
    sel.transition().duration(dur).ease(d3.easeSinInOut)
        .attr('fill-opacity', hi)
        .transition().duration(dur).ease(d3.easeSinInOut)
        .attr('fill-opacity', lo)
        .on('end', () => pulsePath(sel, lo, hi, dur));
}

// ── RIPPLE (recursive SVG transition on r + opacity) ─────────────────────────
function animateRipple(sel) {
    sel.attr('r', 4).attr('opacity', 0.7)
        .transition().duration(2400).ease(d3.easePolyOut.exponent(2))
        .attr('r', 22).attr('opacity', 0)
        .on('end', () => animateRipple(sel));
}

// ── ARC ───────────────────────────────────────────────────────────────────────
function drawArc(country) {
    clearArcs();
    if (!country.coordinates) return;

    const from = HOME.coordinates;
    const to   = country.coordinates;

    // Sample the great-circle line
    const line = {
        type: 'Feature',
        geometry: {
            type: 'LineString',
            coordinates: d3.range(0, 1.005, 0.005)
                .map(t => d3.geoInterpolate(from, to)(t))
        }
    };

    const arcEl = gArcs.append('path')
        .datum(line)
        .attr('class', 'flight-arc')
        .attr('filter', 'url(#glow-arc)')
        .attr('d', geoPath);

    const len = arcEl.node().getTotalLength();

    // Dash-draw animation
    arcEl
        .attr('stroke-dasharray', `${len} ${len}`)
        .attr('stroke-dashoffset', len)
        .transition()
        .duration(1000)
        .ease(d3.easeCubicOut)
        .attr('stroke-dashoffset', 0);

    // Plane dot traveling the arc
    const dot = gArcs.append('circle')
        .attr('r', 2.5)
        .attr('fill', 'white')
        .attr('opacity', 0)
        .attr('filter', 'url(#glow-soft)');

    dot.transition()
        .delay(80)
        .duration(1000)
        .ease(d3.easeCubicOut)
        .attrTween('transform', () => {
            const node = arcEl.node();
            return t => {
                const p = node.getPointAtLength(t * len);
                return `translate(${p.x},${p.y})`;
            };
        })
        .attr('opacity', 1)
        .on('end', function() {
            d3.select(this)
                .transition().duration(600)
                .attr('opacity', 0)
                .remove();
        });
}

function clearArcs() {
    gArcs.selectAll('*').interrupt().remove();
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => location.reload());

init();
</script>
</body>
</html>
